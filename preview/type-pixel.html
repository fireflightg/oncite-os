<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>oncite — type: pixel & typewriter</title>
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    body { margin: 0; padding: 18px 22px; background: #c0c0c0; }
    .row { display: flex; align-items: baseline; gap: 14px; padding: 8px 0; border-bottom: 1px dotted #555; }
    .row:last-child { border-bottom: 0; }
    .meta { font-family: 'Tahoma', 'Arial Narrow', Arial, sans-serif; font-size: 10px; letter-spacing: 0.06em; color: #333; min-width: 140px; font-weight: bold; text-transform: lowercase; }
    .tah-lg { font-family: 'Tahoma', Arial, sans-serif; font-weight: bold; font-size: 32px; line-height: 1; color: #000; }
    .tah-md { font-family: 'Tahoma', Arial, sans-serif; font-weight: bold; font-size: 22px; line-height: 1; color: #0b4dd6; }
    .tah-sm { font-family: 'Tahoma', Arial, sans-serif; font-size: 11px; line-height: 1.3; color: #000; }
    .bsod  { background: #1d2dc7; color: #fff; padding: 3px 8px; display: inline-block; }
  </style>
</head>
<body>
  <div class="row"><div class="meta">tahoma · bold · 32</div><div class="tah-lg">system error 0xf1534</div></div>
  <div class="row"><div class="meta">tahoma · bold · 22</div><div class="tah-md">are you bumpin' that?</div></div>
  <div class="row"><div class="meta">tahoma · 11 · system</div><div class="tah-sm bsod">a fatal exception 0e has occurred at 0028:c0011e36</div></div>
  <div class="row"><div class="meta">tahoma · 11 · note</div><div class="tah-sm">i don't deserve anything i want — but stay, i am trying for u</div></div>
</body>
</html>

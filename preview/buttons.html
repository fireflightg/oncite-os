<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>oncite — buttons</title>
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    body { margin: 0; padding: 22px; background: #c0c0c0; font-family: 'Tahoma', Arial, sans-serif; }
    body::before {
      content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 5;
      background: repeating-linear-gradient(0deg, rgba(0,0,0,0.05) 0 1px, transparent 1px 3px);
    }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 22px 26px; align-items: start; }
    .stack { display: flex; flex-direction: column; gap: 9px; align-items: flex-start; }
    .lbl { font-family: 'Tahoma', Arial, sans-serif; font-size: 10px; color: #222; font-weight: bold; text-transform: lowercase; letter-spacing: 0.02em; }

    /* win98 raised "ok" button */
    .btn-98 {
      font-family: 'Tahoma', 'MS Sans Serif', Arial, sans-serif; font-size: 11px;
      background: #c0c0c0; color: #000; padding: 4px 18px; min-width: 75px;
      border: 1px solid #000;
      box-shadow:
        inset 1px 1px 0 #fff,
        inset -1px -1px 0 #808080,
        inset 2px 2px 0 #dfdfdf,
        inset -2px -2px 0 #404040;
      cursor: pointer; text-transform: lowercase;
    }
    .btn-98:active {
      box-shadow:
        inset 1px 1px 0 #404040,
        inset -1px -1px 0 #dfdfdf,
        inset 2px 2px 0 #808080,
        inset -2px -2px 0 #fff;
      padding: 5px 17px 3px 19px;
    }

    /* xp-style brand-blue gradient */
    .btn-xp {
      font-family: 'Trebuchet MS', sans-serif; font-weight: bold; font-size: 12px;
      background: linear-gradient(180deg, #2c6df0 0%, #0b4dd6 50%, #082c8a 100%);
      color: #fff; padding: 5px 16px; border: 1px solid #000;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.5), 1px 1px 0 #000;
      cursor: pointer; text-transform: lowercase;
      text-shadow: 1px 1px 0 #000;
    }
    .btn-xp:hover { background: linear-gradient(180deg, #4a82ff 0%, #1f63f0 50%, #0b4dd6 100%); }

    /* hyperlink — old-web blue underline */
    .btn-link {
      font-family: 'Microsoft Sans Serif', 'Tahoma', sans-serif; font-size: 13px;
      color: #0b4dd6; background: transparent; border: 0; padding: 0;
      text-decoration: underline; cursor: pointer;
    }
    .btn-link:visited { color: #6b3aa0; }
    .btn-link:hover { color: #1f63f0; }

    /* underconstruction.gif energy — flashing badge */
    .btn-blink {
      font-family: 'Tahoma', sans-serif; font-weight: bold; font-size: 11px;
      background: #ffffff; color: #000; padding: 4px 10px;
      border: 2px ridge #0b4dd6;
      animation: blink 1s steps(2, end) infinite;
      cursor: pointer; text-transform: lowercase;
    }
    @keyframes blink { 50% { background: #0b4dd6; color: #ffffff; } }

    /* dotted-focus ghost */
    .btn-ghost {
      font-family: 'Tahoma', sans-serif; font-size: 11px;
      background: #c0c0c0; color: #000; padding: 4px 14px;
      border: 1px dotted #000; cursor: pointer; text-transform: lowercase;
    }

    /* danger close [×] like a window control */
    .btn-x {
      font-family: 'Marlett','Tahoma', sans-serif; font-weight: bold; font-size: 12px;
      width: 22px; height: 20px; line-height: 18px; text-align: center;
      background: #c0c0c0; color: #000; border: 1px solid #000;
      box-shadow: inset 1px 1px 0 #fff, inset -1px -1px 0 #808080;
      cursor: pointer;
    }

    /* radio + checkbox group sample — crusty */
    .opt { display: flex; align-items: center; gap: 6px; font-family: 'MS Sans Serif','Tahoma',sans-serif; font-size: 11px; }
    .check {
      width: 13px; height: 13px; background: #fff; border: 1px solid #000;
      box-shadow: inset 1px 1px 0 #808080, inset -1px -1px 0 #fff;
      display: inline-flex; align-items: center; justify-content: center;
    }
    .check.on::after { content: "✓"; font-size: 11px; line-height: 1; color: #000; }
  </style>
</head>
<body>
  <div class="grid">
    <div class="stack">
      <div class="lbl">// 98 raised — primary</div>
      <button class="btn-98">ok</button>
      <button class="btn-98">cancel</button>
      <button class="btn-98">browse...</button>
    </div>
    <div class="stack">
      <div class="lbl">// xp brand-blue gradient</div>
      <button class="btn-xp">pre-save</button>
      <button class="btn-xp">download .mp3</button>
    </div>
    <div class="stack">
      <div class="lbl">// hyperlink</div>
      <a class="btn-link" href="#" onclick="event.preventDefault()">click here for tracklist</a>
      <a class="btn-link" href="#" onclick="event.preventDefault()" style="color:#6b3aa0;">visited link</a>
    </div>
    <div class="stack">
      <div class="lbl">// flashing</div>
      <button class="btn-blink">★ new! 06.06 ★</button>
    </div>
    <div class="stack">
      <div class="lbl">// dotted ghost / window x</div>
      <button class="btn-ghost">more options</button>
      <button class="btn-x">×</button>
    </div>
    <div class="stack">
      <div class="lbl">// check / radio</div>
      <div class="opt"><span class="check on"></span> i agree</div>
      <div class="opt"><span class="check"></span> remember me</div>
    </div>
  </div>
</body>
</html>

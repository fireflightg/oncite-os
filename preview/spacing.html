<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>oncite — spacing & radii</title>
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    body { margin: 0; padding: 24px; background: var(--soot-800); color: var(--bone); font-family: var(--font-mono); font-size: 12px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    .col h4 { font-size: 10px; letter-spacing: 0.14em; text-transform: lowercase; color: var(--fg-2); margin: 0 0 10px; font-weight: 500; }
    .row { display: flex; align-items: center; gap: 10px; padding: 4px 0; }
    .bar { background: var(--bone); height: 12px; }
    .ra { background: var(--brand-blue); width: 36px; height: 36px; border: 1px solid #000; }
    .name { width: 80px; opacity: 0.75; }
    .px { opacity: 0.55; margin-left: auto; }
  </style>
</head>
<body>
  <div class="grid">
    <div class="col">
      <h4>// spacing scale</h4>
      <div class="row"><span class="name">sp-2</span><div class="bar" style="width:4px"></div><span class="px">4px</span></div>
      <div class="row"><span class="name">sp-3</span><div class="bar" style="width:8px"></div><span class="px">8px</span></div>
      <div class="row"><span class="name">sp-4</span><div class="bar" style="width:12px"></div><span class="px">12px</span></div>
      <div class="row"><span class="name">sp-5</span><div class="bar" style="width:16px"></div><span class="px">16px</span></div>
      <div class="row"><span class="name">sp-6</span><div class="bar" style="width:24px"></div><span class="px">24px</span></div>
      <div class="row"><span class="name">sp-7</span><div class="bar" style="width:32px"></div><span class="px">32px</span></div>
      <div class="row"><span class="name">sp-8</span><div class="bar" style="width:48px"></div><span class="px">48px</span></div>
      <div class="row"><span class="name">sp-9</span><div class="bar" style="width:64px"></div><span class="px">64px</span></div>
    </div>
    <div class="col">
      <h4>// radii — mostly sharp</h4>
      <div class="row"><span class="name">r-0</span><div class="ra" style="border-radius:0"></div><span class="px">0 — default</span></div>
      <div class="row"><span class="name">r-1</span><div class="ra" style="border-radius:2px"></div><span class="px">2px — chips</span></div>
      <div class="row"><span class="name">r-2</span><div class="ra" style="border-radius:4px"></div><span class="px">4px — buttons</span></div>
      <div class="row"><span class="name">r-pill</span><div class="ra" style="border-radius:999px;width:48px"></div><span class="px">capsule · rare</span></div>
    </div>
  </div>
</body>
</html>

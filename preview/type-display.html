<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>oncite — type: display</title>
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    body { margin: 0; padding: 18px 22px; background: #c0c0c0; image-rendering: pixelated; }
    .row { display: flex; align-items: baseline; gap: 14px; padding: 8px 0; border-bottom: 1px dotted #555; }
    .row:last-child { border-bottom: 0; }
    .meta { font-family: 'Arial Narrow', Arial, sans-serif; font-size: 10px; letter-spacing: 0.1em; text-transform: lowercase; color: #333; min-width: 130px; font-weight: bold; }
    .display-xl { font-family: 'Arial Narrow', 'Helvetica Neue Condensed', Arial, sans-serif; font-weight: bold; font-size: 84px; line-height: 0.9; letter-spacing: -0.01em; color: #000; font-stretch: condensed; transform: scaleX(0.85); transform-origin: left; }
    .display-lg { font-family: 'Arial Narrow', Arial, sans-serif; font-weight: bold; font-size: 52px; line-height: 1; color: #0b4dd6; font-stretch: condensed; transform: scaleX(0.85); transform-origin: left; text-shadow: 2px 2px 0 #000; }
    .display-md { font-family: 'Arial Narrow', Arial, sans-serif; font-weight: bold; font-size: 34px; line-height: 1.05; color: #000; font-stretch: condensed; transform: scaleX(0.85); transform-origin: left; }
  </style>
</head>
<body>
  <div class="row"><div class="meta">arial narrow · 84</div><div class="display-xl">oncite</div></div>
  <div class="row"><div class="meta">arial narrow · 52</div><div class="display-lg">cerebral aura</div></div>
  <div class="row"><div class="meta">arial narrow · 34</div><div class="display-md">don't let myself destruct</div></div>
</body>
</html>

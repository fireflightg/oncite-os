<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>oncite — voice & tone</title>
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    body { margin: 0; padding: 22px 26px; background: var(--soot-800); color: var(--bone); }
    .row { display: grid; grid-template-columns: 90px 1fr; gap: 12px; padding: 8px 0; border-bottom: 1px dashed var(--line-1); }
    .row:last-child { border-bottom: 0; }
    .label { font-family: var(--font-mono); font-size: 10px; color: var(--fg-2); letter-spacing: 0.14em; text-transform: lowercase; padding-top: 3px; }
    .yes { font-family: var(--font-typewriter); font-size: 14px; line-height: 1.4; }
    .no  { font-family: var(--font-typewriter); font-size: 14px; line-height: 1.4; color: var(--fg-3); text-decoration: line-through; }
    .head { font-family: var(--font-display); font-size: 22px; text-transform: lowercase; letter-spacing: -0.02em; margin: 0 0 12px; }
  </style>
</head>
<body>
  <div class="head">voice — quiet, broken, slightly off</div>
  <div class="row"><div class="label">// do</div><div class="yes">don't let myself destruct please let me</div></div>
  <div class="row"><div class="label">// don't</div><div class="no">Hey gang!! Big news 🚨🔥 we're SO excited!!</div></div>
  <div class="row"><div class="label">// do</div><div class="yes">new track. 06.06. you'll know.</div></div>
  <div class="row"><div class="label">// don't</div><div class="no">Click below to pre-save my AMAZING new single ✨</div></div>
  <div class="row"><div class="label">// do</div><div class="yes">file: cerebral_aura_v3_FINAL_final.mp3 — 4.8 mb</div></div>
</body>
</html>

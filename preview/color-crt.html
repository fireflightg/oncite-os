<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>oncite — palette: dead crt</title>
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    body { margin: 0; padding: 18px; background: #1a1c20; }
    .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 0; border: 1px solid var(--line-2); }
    .sw { aspect-ratio: 1.4 / 1; padding: 10px 12px; display: flex; flex-direction: column; justify-content: space-between; box-shadow: var(--bevel-out); }
    .sw .name { font-family: var(--font-mono); font-size: 11px; letter-spacing: var(--tr-system); text-transform: lowercase; }
    .sw .hex  { font-family: var(--font-mono); font-size: 11px; opacity: 0.7; }
    .label-row { font-family: var(--font-mono); font-size: 10px; color: var(--fg-2); letter-spacing: var(--tr-system); text-transform: lowercase; padding: 6px 4px 10px; display: flex; gap: 16px; }
    .label-row span:first-child { color: var(--bone); }
  </style>
</head>
<body>
  <div class="label-row">
    <span>// dead crt</span>
    <span>bluish dark cast — old XP / BSOD</span>
  </div>
  <div class="grid">
    <div class="sw" style="background:#0a1426;color:var(--bone);"><div class="name">crt deep</div><div class="hex">#0a1426</div></div>
    <div class="sw" style="background:#16243d;color:var(--bone);"><div class="name">crt mid</div><div class="hex">#16243d</div></div>
    <div class="sw" style="background:#1c3a6e;color:var(--bone);"><div class="name">crt blue</div><div class="hex">#1c3a6e</div></div>
    <div class="sw" style="background:#4a78c8;color:#07080a;"><div class="name">crt glow</div><div class="hex">#4a78c8</div></div>
    <div class="sw" style="background:#1d2dc7;color:var(--bone);"><div class="name">bsod</div><div class="hex">#1d2dc7</div></div>
  </div>
</body>
</html>

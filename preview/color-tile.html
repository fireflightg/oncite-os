<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>oncite — palette: damp tile</title>
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    body { margin: 0; padding: 18px; background: #1a1c20; }
    .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; border: 1px solid var(--line-2); }
    .sw { aspect-ratio: 1.4 / 1; padding: 10px 12px; display: flex; flex-direction: column; justify-content: space-between; box-shadow: var(--bevel-out); }
    .sw .name { font-family: var(--font-mono); font-size: 11px; letter-spacing: var(--tr-system); text-transform: lowercase; }
    .sw .hex  { font-family: var(--font-mono); font-size: 11px; opacity: 0.7; }
    .label-row { font-family: var(--font-mono); font-size: 10px; color: var(--fg-2); letter-spacing: var(--tr-system); text-transform: lowercase; padding: 6px 4px 10px; display: flex; gap: 16px; }
    .label-row span:first-child { color: var(--bone); }
  </style>
</head>
<body>
  <div class="label-row">
    <span>// damp tile</span>
    <span>bathroom teal — graffiti / area</span>
  </div>
  <div class="grid">
    <div class="sw" style="background:#0c1c1e;color:var(--bone);"><div class="name">tile deep</div><div class="hex">#0c1c1e</div></div>
    <div class="sw" style="background:#143034;color:var(--bone);"><div class="name">tile mid</div><div class="hex">#143034</div></div>
    <div class="sw" style="background:#2a5559;color:var(--bone);"><div class="name">tile teal</div><div class="hex">#2a5559</div></div>
    <div class="sw" style="background:#3d7c80;color:#07080a;"><div class="name">tile bright</div><div class="hex">#3d7c80</div></div>
  </div>
</body>
</html>

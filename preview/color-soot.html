<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>oncite — palette: night & soot</title>
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    body { margin: 0; padding: 18px; background: #1a1c20; }
    .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 0; border: 1px solid var(--line-2); }
    .sw { aspect-ratio: 1.4 / 1; padding: 10px 12px; display: flex; flex-direction: column; justify-content: space-between; box-shadow: var(--bevel-out); }
    .sw .name { font-family: var(--font-mono); font-size: 11px; letter-spacing: var(--tr-system); text-transform: lowercase; }
    .sw .hex  { font-family: var(--font-mono); font-size: 11px; opacity: 0.65; }
    .label-row { font-family: var(--font-mono); font-size: 10px; color: var(--fg-2); letter-spacing: var(--tr-system); text-transform: lowercase; padding: 6px 4px 10px; display: flex; gap: 16px; }
    .label-row span:first-child { color: var(--bone); }
  </style>
</head>
<body>
  <div class="label-row">
    <span>// night &amp; soot</span>
    <span>primary surfaces — never pure black</span>
  </div>
  <div class="grid">
    <div class="sw" style="background:#07080a;color:var(--bone);"><div class="name">soot 900</div><div class="hex">#07080a</div></div>
    <div class="sw" style="background:#0d0f12;color:var(--bone);"><div class="name">soot 800</div><div class="hex">#0d0f12</div></div>
    <div class="sw" style="background:#14171c;color:var(--bone);"><div class="name">soot 700</div><div class="hex">#14171c</div></div>
    <div class="sw" style="background:#1c2128;color:var(--bone);"><div class="name">soot 600</div><div class="hex">#1c2128</div></div>
    <div class="sw" style="background:#262b33;color:var(--bone);"><div class="name">soot 500</div><div class="hex">#262b33</div></div>
    <div class="sw" style="background:#3a3f48;color:var(--bone);"><div class="name">soot 400</div><div class="hex">#3a3f48</div></div>
  </div>
</body>
</html>

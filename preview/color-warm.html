<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>oncite — palette: warm / nostalgia</title>
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    body { margin: 0; padding: 18px; background: #1a1c20; }
    .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; border: 1px solid var(--line-2); }
    .sw { aspect-ratio: 1.4 / 1; padding: 10px 12px; display: flex; flex-direction: column; justify-content: space-between; box-shadow: var(--bevel-out); }
    .sw .name { font-family: var(--font-mono); font-size: 11px; letter-spacing: var(--tr-system); text-transform: lowercase; }
    .sw .hex  { font-family: var(--font-mono); font-size: 11px; opacity: 0.75; }
    .label-row { font-family: var(--font-mono); font-size: 10px; color: var(--fg-2); letter-spacing: var(--tr-system); text-transform: lowercase; padding: 6px 4px 10px; display: flex; gap: 16px; }
    .label-row span:first-child { color: var(--bone); }
  </style>
</head>
<body>
  <div class="label-row">
    <span>// warm / nostalgia</span>
    <span>muted, never neon — paper, rust, dirty piss-yellow</span>
  </div>
  <div class="grid">
    <div class="sw" style="background:#d8d2c2;color:#07080a;"><div class="name">bone</div><div class="hex">#d8d2c2</div></div>
    <div class="sw" style="background:#a39d8d;color:#07080a;"><div class="name">bone dim</div><div class="hex">#a39d8d</div></div>
    <div class="sw" style="background:#6d6857;color:var(--bone);"><div class="name">bone faint</div><div class="hex">#6d6857</div></div>
    <div class="sw" style="background:#3a2a4a;color:var(--bone);"><div class="name">bruise</div><div class="hex">#3a2a4a</div></div>
    <div class="sw" style="background:#0b4dd6;color:var(--bone);"><div class="name">rust</div><div class="hex">#0b4dd6</div></div>
    <div class="sw" style="background:#1f63f0;color:#07080a;"><div class="name">rust bright</div><div class="hex">#1f63f0</div></div>
    <div class="sw" style="background:#ffffff;color:#07080a;"><div class="name">piss</div><div class="hex">#ffffff</div></div>
    <div class="sw" style="background:#000000;color:var(--bone);"><div class="name">moss</div><div class="hex">#000000</div></div>
  </div>
</body>
</html>

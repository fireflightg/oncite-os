<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>oncite — brand blue</title>
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    body { margin: 0; padding: 18px; background: #1a1c20; }
    .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0; border: 1px solid var(--line-2); }
    .sw { aspect-ratio: 1.4 / 1; padding: 10px 12px; display: flex; flex-direction: column; justify-content: space-between; box-shadow: var(--bevel-out); }
    .sw .name { font-family: var(--font-narrow); font-size: 12px; letter-spacing: 0.12em; text-transform: lowercase; font-weight: 700; }
    .sw .hex { font-family: var(--font-mono); font-size: 11px; opacity: 0.85; }
    .label-row { font-family: var(--font-narrow); font-size: 11px; color: var(--fg-2); letter-spacing: 0.14em; text-transform: lowercase; padding: 6px 4px 10px; display: flex; gap: 16px; font-weight: 700; }
    .label-row span:first-child { color: var(--bone); }
  </style>
</head>
<body>
  <div class="label-row">
    <span>// brand blue</span>
    <span>from the cat logo's eyes — the one true accent</span>
  </div>
  <div class="grid">
    <div class="sw" style="background:#082c8a;color:var(--bone);"><div class="name">brand deep</div><div class="hex">#082c8a</div></div>
    <div class="sw" style="background:#0b4dd6;color:var(--bone);"><div class="name">brand blue</div><div class="hex">#0b4dd6</div></div>
    <div class="sw" style="background:#1f63f0;color:var(--bone);"><div class="name">brand hot</div><div class="hex">#1f63f0</div></div>
  </div>
</body>
</html>

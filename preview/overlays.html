<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>oncite — overlays & textures</title>
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    body { margin: 0; padding: 18px; background: #c0c0c0; font-family: 'Tahoma', Arial, sans-serif; }
    .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
    .tile { aspect-ratio: 1.1 / 1; background: #fff; border: 1px solid #000; box-shadow: 2px 2px 0 #000; position: relative; overflow: hidden; display: flex; align-items: flex-end; }
    .tile .lbl { position: relative; z-index: 3; font-family: 'MS Sans Serif','Tahoma',sans-serif; font-size: 10px; color: #000; padding: 3px 6px; background: #ffffff; border-top: 1px solid #000; border-right: 1px solid #000; }

    /* scanlines (heavy CRT) */
    .scan::after { content: ""; position: absolute; inset: 0;
      background: repeating-linear-gradient(0deg, rgba(0,0,0,0.35) 0 1px, transparent 1px 3px); }

    /* halftone — dirty dot pattern */
    .halftone {
      background:
        radial-gradient(circle at 1px 1px, #000 1px, transparent 1.4px) 0 0/4px 4px,
        #fff;
    }

    /* under-construction stripes (animated barbershop) */
    .construction {
      background: repeating-linear-gradient(45deg, #ffffff 0 12px, #000 12px 24px);
      animation: stripe 1s linear infinite;
    }
    @keyframes stripe { to { background-position: 34px 0; } }

    /* checker (transparency / 90s web) */
    .checker {
      background-image:
        linear-gradient(45deg, #888 25%, transparent 25%),
        linear-gradient(-45deg, #888 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #888 75%),
        linear-gradient(-45deg, transparent 75%, #888 75%);
      background-size: 12px 12px;
      background-position: 0 0, 0 6px, 6px -6px, -6px 0;
      background-color: #fff;
    }

    /* glitch — RGB shift over text */
    .glitch { background: #07080a; color: #fff; padding: 0; }
    .glitch::before { content: "0xf1534"; position: absolute; left: 12px; top: 14px; font-family: 'Tahoma', sans-serif; font-weight: bold; font-size: 32px; color: #fff; }
    .glitch::after { content: "0xf1534"; position: absolute; left: 14px; top: 16px; font-family: 'Tahoma', sans-serif; font-weight: bold; font-size: 32px; color: #0b4dd6; mix-blend-mode: screen; }

    /* dithered gradient (1-bit) */
    .dither {
      background:
        linear-gradient(180deg, transparent, #000),
        repeating-conic-gradient(#000 0 25%, #fff 0 50%) 0 0/3px 3px;
      background-blend-mode: multiply;
    }

    /* tv noise */
    .noise {
      background:
        repeating-linear-gradient(0deg, rgba(0,0,0,0.15) 0 1px, transparent 1px 2px),
        repeating-linear-gradient(90deg, rgba(0,0,0,0.06) 0 1px, transparent 1px 2px),
        radial-gradient(circle at 30% 40%, rgba(11,77,214,0.3), transparent 60%),
        #999;
    }

    /* photo + scan combo */
    .photo {
      background-image: url("../assets/refs/fisheye-portrait.png");
      background-size: cover; background-position: center;
      filter: contrast(1.2) saturate(0.6);
      image-rendering: pixelated;
    }
    .photo::after { content: ""; position: absolute; inset: 0;
      background: repeating-linear-gradient(0deg, rgba(0,0,0,0.4) 0 1px, transparent 1px 3px),
                  linear-gradient(180deg, rgba(11,77,214,0.15), transparent); }

    /* damaged — random scratches */
    .damaged {
      background: #07080a;
    }
    .damaged::before { content: ""; position: absolute; inset: 0;
      background:
        linear-gradient(94deg, transparent 30%, rgba(255,255,255,0.4) 30.2%, transparent 30.4%),
        linear-gradient(89deg, transparent 60%, rgba(255,255,255,0.2) 60.1%, transparent 60.3%),
        linear-gradient(91deg, transparent 14%, rgba(255,255,255,0.3) 14.1%, transparent 14.3%); }
    .damaged::after { content: ""; position: absolute; inset: 0;
      background: radial-gradient(ellipse 40% 8% at 30% 80%, rgba(255,255,255,0.4), transparent),
                  radial-gradient(ellipse 20% 4% at 70% 30%, rgba(255,255,255,0.5), transparent); }

    /* dark vignette */
    .vignette { background:
      radial-gradient(ellipse at center, #ffffff 0%, #0b4dd6 40%, #07080a 100%); }
  </style>
</head>
<body>
  <div class="grid">
    <div class="tile scan photo"><span class="lbl">scan + photo</span></div>
    <div class="tile halftone"><span class="lbl">halftone dot</span></div>
    <div class="tile construction"><span class="lbl">under construction</span></div>
    <div class="tile checker"><span class="lbl">90s checker</span></div>
    <div class="tile glitch"><span class="lbl">rgb glitch</span></div>
    <div class="tile dither"><span class="lbl">1-bit dither</span></div>
    <div class="tile noise"><span class="lbl">tv noise</span></div>
    <div class="tile damaged"><span class="lbl">vhs scratches</span></div>
  </div>
</body>
</html>
